name: Runtime Adapter Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  adapter-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify runtime adapters
        run: python3 system/scripts/adapter_guard.py --mode check
